<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roster Dashboard</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;500;700&display=swap');

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: #0a0a0a;
        color: #f0f0f0;
        font-family: 'Syne', sans-serif;
        min-height: 100vh;
        padding: 24px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 16px;
        margin-bottom: 24px;
        border-bottom: 1px solid #222;
      }

      .logo {
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: #555;
      }

      .live {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: #c8f135;
        font-family: 'DM Mono', monospace;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #c8f135;
        animation: blink 2s infinite;
      }

      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.2; }
      }

      .tabs {
        display: flex;
        gap: 4px;
        background: #111;
        padding: 4px;
        border-radius: 8px;
        border: 1px solid #222;
        margin-bottom: 24px;
      }

      .tab {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        border: none;
        background: transparent;
        color: #555;
        font-family: 'Syne', sans-serif;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.15s;
      }

      .tab.active {
        background: #1a1a1a;
        color: #f0f0f0;
        border: 1px solid #333;
      }

      .tab:hover:not(.active) {
        color: #f0f0f0;
      }

      .artist-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 20px;
      }

      .avatar {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: #1a1a1a;
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 500;
        color: #c8f135;
        flex-shrink: 0;
      }

      .artist-name {
        font-size: 20px;
        font-weight: 700;
      }

      .artist-genre {
        font-size: 11px;
        font-family: 'DM Mono', monospace;
        color: #555;
        margin-top: 2px;
      }

      .kpi-grid {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 10px;
        margin-bottom: 24px;
      }

      .kpi {
        background: #111;
        border: 1px solid #222;
        border-radius: 10px;
        padding: 16px;
      }

      .kpi-label {
        font-size: 10px;
        font-family: 'DM Mono', monospace;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 8px;
      }

      .kpi-value {
        font-size: 22px;
        font-weight: 700;
        color: #f0f0f0;
      }

      .kpi-sub {
        font-size: 11px;
        font-family: 'DM Mono', monospace;
        color: #444;
        margin-top: 6px;
      }

      .kpi-sub.up { color: #c8f135; }
      .kpi-sub.down { color: #ff6b35; }

      .section-title {
        font-size: 10px;
        font-family: 'DM Mono', monospace;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 12px;
      }

      .chart-wrap {
        background: #111;
        border: 1px solid #222;
        border-radius: 10px;
        padding: 16px;
        margin-bottom: 24px;
      }

      .chart-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
      }

      .chart-note {
        font-size: 10px;
        font-family: 'DM Mono', monospace;
        color: #444;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 24px;
      }

      .panel {
        background: #111;
        border: 1px solid #222;
        border-radius: 10px;
        padding: 16px;
      }

      .track {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #1a1a1a;
      }

      .track:last-child { border-bottom: none; }

      .track-num {
        font-size: 11px;
        font-family: 'DM Mono', monospace;
        color: #444;
        width: 16px;
        flex-shrink: 0;
      }

      .track-name {
        flex: 1;
        font-size: 13px;
        color: #f0f0f0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .track-bar-wrap {
        width: 60px;
        height: 3px;
        background: #1a1a1a;
        border-radius: 2px;
        flex-shrink: 0;
      }

      .track-bar {
        height: 3px;
        border-radius: 2px;
        background: #c8f135;
      }

      .track-plays {
        font-size: 11px;
        font-family: 'DM Mono', monospace;
        color: #555;
        width: 44px;
        text-align: right;
        flex-shrink: 0;
      }

      .album {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 10px 0;
        border-bottom: 1px solid #1a1a1a;
      }

      .album:last-child { border-bottom: none; }

      .album-num {
        font-size: 11px;
        font-family: 'DM Mono', monospace;
        color: #444;
        width: 16px;
        flex-shrink: 0;
      }

      .album-info {
        flex: 1;
        overflow: hidden;
      }

      .album-name {
        font-size: 13px;
        color: #f0f0f0;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .album-plays {
        font-size: 10px;
        font-family: 'DM Mono', monospace;
        color: #555;
        margin-top: 2px;
      }

      .loading {
        font-size: 12px;
        font-family: 'DM Mono', monospace;
        color: #444;
        padding: 20px 0;
      }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
    <script>
      const ARTISTS = {
        gabzy:      { genre: 'Afrobeats / R&B',  lastfmName: 'Gabzy' },
        dayor:      { genre: 'R&B / Soul',        lastfmName: 'Dayor' },
        fromjerome: { genre: 'R&B / Dancehall',   lastfmName: 'fromjerome' }
      }

      let currentArtist = 'gabzy'
      let trendChart = null

      function loadHistory(artistKey) {
        const raw = localStorage.getItem(`roster_${artistKey}_history`)
        return raw ? JSON.parse(raw) : []
      }

      function saveSnapshot(artistKey, listeners, playcount) {
        const history = loadHistory(artistKey)
        const today = new Date().toISOString().split('T')[0]
        const alreadySaved = history.find(h => h.date === today)
        if (!alreadySaved) {
          history.push({ date: today, listeners: parseInt(listeners), playcount: parseInt(playcount) })
          if (history.length > 30) history.shift()
          localStorage.setItem(`roster_${artistKey}_history`, JSON.stringify(history))
        }
        return history
      }

      function getChange(history, field) {
        if (history.length < 2) return null
        return history[history.length - 1][field] - history[history.length - 2][field]
      }

      function formatNumber(n) {
        n = parseInt(n)
        if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M'
        if (n >= 1000) return (n / 1000).toFixed(1) + 'K'
        return n.toString()
      }

      function formatChange(diff) {
        if (diff === null) return { text: 'first snapshot saved', cls: '' }
        if (diff > 0) return { text: '+' + formatNumber(diff) + ' since last visit', cls: 'up' }
        if (diff < 0) return { text: formatNumber(diff) + ' since last visit', cls: 'down' }
        return { text: 'no change since last visit', cls: '' }
      }

      function renderTrendChart(history) {
        if (trendChart) { trendChart.destroy(); trendChart = null }
        const canvas = document.getElementById('trendChart')
        if (!canvas || history.length === 0) return
        trendChart = new Chart(canvas, {
          type: 'line',
          data: {
            labels: history.map(h => h.date.slice(5)),
            datasets: [{
              data: history.map(h => h.playcount),
              borderColor: '#c8f135',
              backgroundColor: 'rgba(200,241,53,0.06)',
              fill: true,
              tension: 0.4,
              pointRadius: history.length === 1 ? 4 : 2,
              pointBackgroundColor: '#c8f135',
              borderWidth: 2
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: {
                grid: { color: '#1a1a1a' },
                ticks: { color: '#444', font: { size: 10 } }
              },
              y: {
                grid: { color: '#1a1a1a' },
                ticks: { color: '#444', font: { size: 10 }, callback: v => formatNumber(v) }
              }
            }
          }
        })
      }

      async function getArtistData(name) {
        const res = await fetch(`http://localhost:3000/artist/${name}`)
        const data = await res.json()
        return data.artist
      }

      async function getTopTracks(name) {
        const res = await fetch(`http://localhost:3000/artist/${name}/top-tracks`)
        const data = await res.json()
        return data.toptracks.track.slice(0, 6)
      }

      async function getTopAlbums(name) {
        const res = await fetch(`http://localhost:3000/artist/${name}/top-albums`)
        const data = await res.json()
        return data.topalbums ? data.topalbums.album.slice(0, 6) : []
      }

      async function renderArtist(artistKey) {
        document.getElementById('artist-name').textContent = 'Loading...'
        document.getElementById('track-list').innerHTML = '<div class="loading">Loading...</div>'
        document.getElementById('album-list').innerHTML = '<div class="loading">Loading...</div>'

        const artist = ARTISTS[artistKey]

        const [data, tracks, albums] = await Promise.all([
          getArtistData(artist.lastfmName),
          getTopTracks(artist.lastfmName),
          getTopAlbums(artist.lastfmName)
        ])

        const listeners = data.stats.listeners
        const playcount = data.stats.playcount
        const history = saveSnapshot(artistKey, listeners, playcount)

        const initials = data.name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2)
        document.getElementById('artist-avatar').textContent = initials
        document.getElementById('artist-name').textContent = data.name
        document.getElementById('artist-genre').textContent = artist.genre
        document.getElementById('stat-listeners').textContent = formatNumber(listeners)
        document.getElementById('stat-playcount').textContent = formatNumber(playcount)
        document.getElementById('stat-albums').textContent = albums.length

        const lc = formatChange(getChange(history, 'listeners'))
        const pc = formatChange(getChange(history, 'playcount'))
        document.getElementById('stat-listeners-change').textContent = lc.text
        document.getElementById('stat-listeners-change').className = 'kpi-sub ' + lc.cls
        document.getElementById('stat-playcount-change').textContent = pc.text
        document.getElementById('stat-playcount-change').className = 'kpi-sub ' + pc.cls

        renderTrendChart(history)

        const maxPlays = Math.max(...tracks.map(t => parseInt(t.playcount)))
        document.getElementById('track-list').innerHTML = tracks.map((t, i) => {
          const pct = Math.round((parseInt(t.playcount) / maxPlays) * 100)
          return `
            <div class="track">
              <span class="track-num">${i + 1}</span>
              <span class="track-name">${t.name}</span>
              <div class="track-bar-wrap"><div class="track-bar" style="width:${pct}%"></div></div>
              <span class="track-plays">${formatNumber(t.playcount)}</span>
            </div>
          `
        }).join('')

        if (albums.length === 0) {
          document.getElementById('album-list').innerHTML = '<div class="loading">No album data</div>'
        } else {
          document.getElementById('album-list').innerHTML = albums.map((a, i) => `
            <div class="album">
              <span class="album-num">${i + 1}</span>
              <div class="album-info">
                <div class="album-name">${a.name}</div>
                <div class="album-plays">${formatNumber(a.playcount)} plays</div>
              </div>
            </div>
          `).join('')
        }
      }

      function selectArtist(name, btn) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
        btn.classList.add('active')
        currentArtist = name
        renderArtist(currentArtist)
      }

      window.addEventListener('DOMContentLoaded', () => {
        renderArtist(currentArtist)
      })
    </script>
  </head>
  <body>

    <div class="topbar">
      <div class="logo">Roster Analytics</div>
      <div class="live">
        <div class="dot"></div>
        Live
      </div>
    </div>

    <div class="tabs">
      <button class="tab active" onclick="selectArtist('gabzy', this)">gabzy</button>
      <button class="tab" onclick="selectArtist('dayor', this)">dayor</button>
      <button class="tab" onclick="selectArtist('fromjerome', this)">fromjerome</button>
    </div>

    <div class="artist-header">
      <div class="avatar" id="artist-avatar">—</div>
      <div>
        <div id="artist-name" class="artist-name">Loading...</div>
        <div id="artist-genre" class="artist-genre"></div>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi">
        <div class="kpi-label">Total Listeners</div>
        <div class="kpi-value" id="stat-listeners">—</div>
        <div class="kpi-sub" id="stat-listeners-change"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Total Plays</div>
        <div class="kpi-value" id="stat-playcount">—</div>
        <div class="kpi-sub" id="stat-playcount-change"></div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Albums on Record</div>
        <div class="kpi-value" id="stat-albums">—</div>
        <div class="kpi-sub">tracked by Last.fm</div>
      </div>
    </div>

    <div class="chart-wrap">
      <div class="chart-header">
        <div class="section-title" style="margin-bottom:0">Play Count Trend</div>
        <div class="chart-note">builds daily as you use the dashboard</div>
      </div>
      <div style="position:relative;height:180px">
        <canvas id="trendChart" role="img" aria-label="Play count trend over time"></canvas>
      </div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="section-title">Top Tracks</div>
        <div id="track-list"><div class="loading">Loading...</div></div>
      </div>
      <div class="panel">
        <div class="section-title">Top Albums</div>
        <div id="album-list"><div class="loading">Loading...</div></div>
      </div>
    </div>

  </body>
</html>
